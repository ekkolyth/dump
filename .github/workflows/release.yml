name: Release

on:
  push:
    branches: [main]
    paths: ['package.json']
  workflow_dispatch:

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Read version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Check if version changed
        id: check
        run: |
          if git diff HEAD~1 -- package.json | grep -q '"version"'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: version
    if: needs.version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            go-version-file: go.mod
          - goos: darwin
            goarch: arm64
            go-version-file: go.mod
          - goos: darwin
            goarch: amd64
            go-version: '1.24'
            suffix: _macos11
          - goos: darwin
            goarch: arm64
            go-version: '1.24'
            suffix: _macos11
          - goos: linux
            goarch: amd64
            go-version-file: go.mod
          - goos: linux
            goarch: arm64
            go-version-file: go.mod
          - goos: windows
            goarch: amd64
            go-version-file: go.mod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version || '' }}
          go-version-file: ${{ matrix.go-version && '' || 'go.mod' }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          SUFFIX="${{ matrix.suffix }}"
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags "-X github.com/ekkolyth/dump/internal/version.Version=$VERSION" \
            -o "dump-$GOOS-$GOARCH$SUFFIX$EXT" ./cmd/dump

      - uses: actions/upload-artifact@v4
        with:
          name: dump-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}
          path: dump-*

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package archives
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          mkdir -p dist

          for dir in artifacts/dump-*/; do
            binary=$(ls "$dir")
            platform=$(echo "$binary" | sed 's/dump-//' | sed 's/\.exe$//')
            os=$(echo "$platform" | cut -d- -f1)
            arch=$(echo "$platform" | cut -d- -f2 | sed 's/_.*//')
            suffix=$(echo "$platform" | grep -o '_macos11' || true)

            if echo "$binary" | grep -q '\.exe$'; then
              # Windows: zip
              cp "$dir/$binary" dump.exe
              zip "dist/dump_${VERSION}_${os}_${arch}${suffix}.zip" dump.exe
              rm dump.exe
            else
              # macOS/Linux: tar.gz
              cp "$dir/$binary" dump
              chmod +x dump
              tar -czf "dist/dump_${VERSION}_${os}_${arch}${suffix}.tar.gz" dump
              rm dump
            fi
          done

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          gh release create "v$VERSION" dist/* \
            --repo "${{ github.repository }}" \
            --title "v$VERSION" \
            --generate-notes \
            || gh release upload "v$VERSION" dist/* \
              --repo "${{ github.repository }}" \
              --clobber
